services:
  # ── Reverse Proxy (automatic HTTPS) ──────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # TLS certs
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

  # ── FastAPI Backend ──────────────────────────────────────────────────
  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - fmu-library:/opt/fmu-platform/fmu-library
      - projects:/opt/fmu-platform/projects
      - temp:/opt/fmu-platform/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Celery Worker (1 worker per AMESim license) ──────────────────────
  celery-worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    entrypoint: []
    command: >
      celery -A workers.celery_app worker
      --loglevel=info
      --concurrency=${LICENSE_POOL_SIZE:-3}
    volumes:
      - fmu-library:/opt/fmu-platform/fmu-library
      - projects:/opt/fmu-platform/projects
      - temp:/opt/fmu-platform/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fmu_platform}
      POSTGRES_USER: ${POSTGRES_USER:-fmu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fmu}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: .env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  fmu-library:
  projects:
  temp:
  caddy_data:
  caddy_config:
